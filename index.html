<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rocket Sideswipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; 
            height: 100%; height: 100dvh; 
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        #main-wrapper {
            position: absolute; 
            overflow: hidden;
            /* Dimensions and positioning controlled entirely by JS for letterboxing */
        }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-color: #0a0a1a;
        }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; z-index: 100; 
        }
        .interactive { pointer-events: auto; }
        
        #mobile-controls {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 50;
        }
        .touch-zone { position: absolute; pointer-events: auto; }
        
        #joystick-area { left: 0; top: 0; width: 50%; height: 100%; }
        
        #action-area { 
            right: 0; top: 0; width: 50%; height: 100%; 
            display: flex; justify-content: flex-end; align-items: flex-end; 
            padding: max(40px, env(safe-area-inset-bottom)) max(30px, env(safe-area-inset-right)); 
            gap: 20px;
        }
        
        .control-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 14px;
            backdrop-filter: blur(4px); transition: background 0.1s;
        }
        .control-btn.active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        #joystick-base {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        #joystick-stick {
            position: absolute; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.4); transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5); pointer-events: none;
        }

        .neon-text { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
        .glass-panel { background: rgba(15, 20, 35, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        
        @media (max-width: 768px) {
            .desktop-hint { display: none; }
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div id="game-container"></div>

        <div id="ui-layer">
            
            <!-- Global Coins Display -->
            <div id="pucks-display" class="absolute top-0 right-0 z-50 pointer-events-auto transition-opacity duration-300" style="padding-top: max(16px, env(safe-area-inset-top)); padding-right: max(16px, env(safe-area-inset-right));">
                <div class="flex items-center gap-3 glass-panel px-4 py-2 sm:py-3 rounded-xl border-b-4 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.4)]">
                    <span class="text-yellow-400 font-bold text-sm sm:text-lg tracking-wider leading-none">COINS:</span>
                    <span id="pucks-count" class="text-white font-black text-lg sm:text-xl leading-none">0</span>
                </div>
            </div>

            <!-- In-Game HUD -->
            <div id="hud" class="absolute top-0 left-0 w-full flex justify-between items-start hidden transition-opacity duration-500 z-10 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));">
                
                <!-- Timer Display -->
                <div id="game-timer" class="absolute left-1/2 transform -translate-x-1/2 top-4 glass-panel px-6 py-2 rounded-xl border-b-4 border-gray-400 text-white font-black text-3xl sm:text-5xl tracking-widest text-shadow-md z-20 pointer-events-auto">
                    2:00
                </div>

                <div class="flex flex-col gap-2 pointer-events-auto w-40 sm:w-48">
                    <div id="p1-panel" class="flex items-center justify-between gap-4 glass-panel p-3 rounded-xl border-l-4 transition-all duration-300 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        <span id="p1-label" class="font-bold text-xl uppercase tracking-wider neon-text leading-none text-blue-400">BLUE</span>
                        <span id="score1" class="text-white font-black text-3xl leading-none">0</span>
                    </div>
                </div>
                
                <div class="flex flex-col gap-2 items-end pointer-events-auto mt-16 md:mt-0 w-40 sm:w-48">
                    <div class="flex items-center justify-between gap-4 glass-panel p-3 rounded-xl border-r-4 border-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.5)] flex-row-reverse">
                        <span id="score2" class="text-white font-black text-3xl leading-none">0</span>
                        <span class="text-orange-400 font-bold text-xl uppercase tracking-wider neon-text leading-none">ORANGE</span>
                    </div>
                </div>
            </div>
            
            <!-- Round Messages -->
            <div id="round-message" class="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                <span id="round-text" class="text-white font-black text-5xl md:text-8xl uppercase tracking-widest text-center transform scale-150 opacity-0 transition-all duration-300 neon-text" style="color: #fff;">GO!</span>
            </div>

            <!-- Main Menu -->
            <div id="main-menu" class="absolute inset-0 z-20 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));">
                
                <div id="menu-left" class="absolute top-6 left-6 sm:top-10 sm:left-10 pointer-events-auto transition-transform duration-500 ease-in-out transform translate-x-0">
                    <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 mb-1 uppercase tracking-tighter" style="filter: drop-shadow(0 0 8px rgba(59,130,246,0.5));">
                        ROCKET
                    </h1>
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-6 tracking-widest uppercase neon-text" style="color: #e2e8f0;">SIDESWIPE</h2>
                    
                    <div class="text-sm text-gray-400 glass-panel p-4 rounded-2xl border border-gray-700 max-w-[240px] hidden sm:block">
                        <strong class="text-gray-200 block mb-2">Desktop Controls:</strong>
                        A/D: Drive / Spin in air<br>
                        Up/Down Arrows: Tilt Nose<br>
                        W: Jump (Double tap to flip)<br>
                        Space: Rocket Boost
                    </div>
                </div>

                <div id="menu-right" class="absolute bottom-6 right-6 sm:bottom-10 sm:right-10 flex flex-col gap-4 items-end pointer-events-auto w-48 sm:w-64 transition-transform duration-500 ease-in-out transform translate-x-0">
                    <button onclick="startGame()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded-xl sm:rounded-2xl text-lg sm:text-xl transition transform hover:scale-105 shadow-[0_0_20px_rgba(59,130,246,0.6)] border-b-4 border-blue-900 cursor-pointer flex justify-between items-center">
                        <span>PLAY</span>
                    </button>

                    <button onclick="openShop()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded-xl sm:rounded-2xl text-lg sm:text-xl transition transform hover:scale-105 shadow-[0_0_20px_rgba(168,85,247,0.5)] border-b-4 border-purple-900 cursor-pointer flex justify-between items-center">
                        <span>GARAGE</span>
                    </button>
                </div>
            </div>

            <!-- Garage / Shop -->
            <div id="shop-menu" class="absolute inset-0 z-40 hidden flex-col transition-opacity duration-500 opacity-0 pointer-events-none">
                <div class="absolute top-0 left-0 w-full flex justify-start items-start z-50 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) 0 0 max(16px, env(safe-area-inset-left));">
                    <button onclick="closeShop()" class="pointer-events-auto glass-panel px-4 sm:px-5 py-2 sm:py-3 rounded-xl border-b-4 border-gray-700 hover:bg-gray-800 text-white font-bold transition flex items-center gap-2 shadow-lg leading-none text-sm sm:text-base">
                        BACK
                    </button>
                </div>

                <div class="absolute top-24 sm:top-28 left-1/2 transform -translate-x-1/2 w-[90%] max-w-xs pointer-events-none z-20 flex justify-center">
                    <div id="shop-item-action" class="w-full pointer-events-auto shadow-2xl rounded-xl"></div>
                </div>

                <div class="absolute inset-0 flex items-center justify-between px-4 sm:px-24 pointer-events-none z-10">
                    <button onclick="prevShopItem()" class="pointer-events-auto bg-black bg-opacity-60 hover:bg-opacity-90 text-white rounded-full w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center border-2 border-gray-500 transition transform hover:scale-110 shadow-[0_0_15px_rgba(0,0,0,0.8)] cursor-pointer">
                        &lt;
                    </button>
                    <button onclick="nextShopItem()" class="pointer-events-auto bg-black bg-opacity-60 hover:bg-opacity-90 text-white rounded-full w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center border-2 border-gray-500 transition transform hover:scale-110 shadow-[0_0_15px_rgba(0,0,0,0.8)] cursor-pointer">
                        &gt;
                    </button>
                </div>

                <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-lg pointer-events-none z-20 flex flex-col items-center">
                    <h2 id="shop-item-name" class="text-4xl sm:text-5xl font-black uppercase text-center drop-shadow-[0_4px_4px_rgba(0,0,0,1)] mb-2">NAME</h2>
                    <p id="shop-item-desc" class="text-gray-200 font-medium italic text-base sm:text-lg leading-relaxed text-center drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] w-full">Desc</p>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over" class="interactive flex-1 flex flex-col justify-center items-center bg-black bg-opacity-80 backdrop-blur-md z-30 hidden absolute inset-0 transition-opacity duration-300">
                <div class="glass-panel p-10 rounded-3xl flex flex-col items-center text-center shadow-2xl">
                    <h1 id="winner-text" class="text-5xl md:text-7xl font-black text-white mb-4 tracking-wider uppercase drop-shadow-[0_0_20px_currentColor]">BLUE WINS!</h1>
                    <p id="reward-text" class="text-yellow-400 font-bold text-2xl mb-8 hidden">+15 COINS EARNED!</p>
                    
                    <button onclick="returnToMenu()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-10 rounded-xl text-xl transition transform hover:scale-105 shadow-lg border-b-4 border-gray-800 cursor-pointer">
                        Main Menu
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-controls">
            <div id="joystick-area" class="touch-zone">
                <div id="joystick-base"><div id="joystick-stick"></div></div>
            </div>
            <div id="action-area" class="touch-zone">
                <div id="btn-boost" class="control-btn" style="box-shadow: 0 0 15px rgba(239,68,68,0.5); border-color: #ef4444;">BOOST</div>
                <div id="btn-jump" class="control-btn" style="box-shadow: 0 0 15px rgba(59,130,246,0.5); border-color: #3b82f6;">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // --- 1. GAME CONSTANTS & STATE ---
        const GAME = {
            state: 'MENU', // MENU, SHOP, PLAYING, POST_GOAL, ROUND_OVER, GAME_OVER
            width: window.innerWidth,
            height: window.innerHeight,
            timeRemaining: 120, // 2 minutes in seconds
            timeUp: false,
            isOvertime: false,
            arena: { width: 55, height: 40 }, // Made wider to stretch the field
            gravity: 0.015,
            dt: 1,
            testingMode: false
        };

        const INPUT = { 
            left: false, right: false, jump: false, up: false, down: false, boost: false,
            joyX: 0, joyY: 0, joyActive: false 
        };

        const UI = {
            wrapper: document.getElementById('main-wrapper'),
            menu: document.getElementById('main-menu'),
            shop: document.getElementById('shop-menu'),
            hud: document.getElementById('hud'),
            gameOver: document.getElementById('game-over'),
            pucksDisplay: document.getElementById('pucks-display'),
            pucksCount: document.getElementById('pucks-count'),
            score1: document.getElementById('score1'),
            score2: document.getElementById('score2'),
            p1Panel: document.getElementById('p1-panel'),
            timerDisplay: document.getElementById('game-timer'),
            msgContainer: document.getElementById('round-message'),
            msgText: document.getElementById('round-text'),
            winnerText: document.getElementById('winner-text'),
            rewardText: document.getElementById('reward-text'),
            mobileControls: document.getElementById('mobile-controls')
        };

        const isMobileDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 768);
        let currentRoundId = 0;

        // --- 1.5 PLAYER DATA & SHOP SYSTEM ---
        const PLAYER_DATA = {
            pucks: 0,
            owned: ['Octan'],
            selected: 'Octan'
        };

        const SHOP_ITEMS = [
            { id: 'Octan', name: 'Octan', cost: 0, color: '#3b82f6', desc: 'The classic lightweight workhorse. Well balanced.' },
            { id: 'Domino', name: 'Domino', cost: 20, color: '#8b5cf6', desc: 'Long and flat. Great for powerful flicks.' },
            { id: 'Fennel', name: 'Fennel', cost: 50, color: '#10b981', desc: 'Boxy shape fits the hitbox perfectly. Pro choice.' },
            { id: 'Scabab', name: 'Scabab', cost: 100, color: '#ef4444', desc: 'A chunky, aggressive orb-tank. Deadly in the air.' },
            { id: 'Goliath', name: 'Goliath', cost: 200, color: '#f59e0b', desc: 'Massive monster truck. Intimidate your opponent.' }
        ];

        let currentShopIndex = 0;
        let lastTime = performance.now();

        // Shared Camera Interpolation vectors
        const currentLookAt = new THREE.Vector3(0, 8, 0);
        const targetLookAt = new THREE.Vector3(0, 8, 0);

        function updateShopUI() {
            UI.pucksCount.innerText = PLAYER_DATA.pucks;
            const item = SHOP_ITEMS[currentShopIndex];
            
            document.getElementById('shop-item-name').innerText = item.name;
            document.getElementById('shop-item-name').style.color = item.color;
            document.getElementById('shop-item-desc').innerText = item.desc;
            
            const isOwned = PLAYER_DATA.owned.includes(item.id);
            const isSelected = PLAYER_DATA.selected === item.id;
            const canAfford = PLAYER_DATA.pucks >= item.cost;
            
            const actionContainer = document.getElementById('shop-item-action');
            if (isSelected) {
                actionContainer.innerHTML = `<button class="w-full bg-green-600 text-white font-bold py-2 sm:py-4 rounded-xl cursor-default border-b-4 border-green-800 shadow-[0_0_15px_rgba(22,163,74,0.5)] text-sm sm:text-xl">EQUIPPED</button>`;
            } else if (isOwned) {
                actionContainer.innerHTML = `<button onclick="selectCar('${item.id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 sm:py-4 rounded-xl transition transform hover:scale-105 border-b-4 border-blue-800 cursor-pointer shadow-lg text-sm sm:text-xl">EQUIP BODY</button>`;
            } else if (canAfford) {
                actionContainer.innerHTML = `<button onclick="buyCar('${item.id}')" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-2 sm:py-4 rounded-xl transition transform hover:scale-105 border-b-4 border-yellow-700 cursor-pointer shadow-[0_0_15px_rgba(234,179,8,0.5)] text-sm sm:text-xl">BUY (${item.cost} COINS)</button>`;
            } else {
                actionContainer.innerHTML = `<button class="w-full bg-gray-700 text-gray-500 font-bold py-2 sm:py-4 rounded-xl cursor-not-allowed border-b-4 border-gray-900 text-sm sm:text-xl">LOCKED (${item.cost} COINS)</button>`;
            }
        }

        function prevShopItem() {
            currentShopIndex = (currentShopIndex - 1 + SHOP_ITEMS.length) % SHOP_ITEMS.length;
            updateShopUI(); setupShopCar();
        }
        function nextShopItem() {
            currentShopIndex = (currentShopIndex + 1) % SHOP_ITEMS.length;
            updateShopUI(); setupShopCar();
        }

        function openShop() {
            GAME.state = 'SHOP';
            currentShopIndex = SHOP_ITEMS.findIndex(i => i.id === PLAYER_DATA.selected);
            if(currentShopIndex === -1) currentShopIndex = 0;
            
            document.getElementById('menu-left').classList.replace('translate-x-0', '-translate-x-[150%]');
            document.getElementById('menu-right').classList.replace('translate-x-0', 'translate-x-[150%]');
            
            UI.shop.classList.remove('hidden'); UI.shop.classList.add('flex');
            setTimeout(() => {
                UI.shop.classList.replace('opacity-0', 'opacity-100');
                UI.shop.classList.add('pointer-events-auto');
            }, 50);
            updateShopUI(); setupShopCar();
        }

        function closeShop() {
            GAME.state = 'MENU';
            UI.shop.classList.replace('opacity-100', 'opacity-0');
            UI.shop.classList.remove('pointer-events-auto');
            setTimeout(() => { UI.shop.classList.add('hidden'); UI.shop.classList.remove('flex'); }, 500);
            document.getElementById('menu-left').classList.replace('-translate-x-[150%]', 'translate-x-0');
            document.getElementById('menu-right').classList.replace('translate-x-[150%]', 'translate-x-0');
            setupMenuCars();
        }

        function buyCar(id) {
            const item = SHOP_ITEMS.find(i => i.id === id);
            if (PLAYER_DATA.pucks >= item.cost && !PLAYER_DATA.owned.includes(id)) {
                PLAYER_DATA.pucks -= item.cost; PLAYER_DATA.owned.push(id); PLAYER_DATA.selected = id;
                updateShopUI(); setupMenuCars(); 
            }
        }

        function selectCar(id) {
            if (PLAYER_DATA.owned.includes(id)) {
                PLAYER_DATA.selected = id; updateShopUI(); setupMenuCars(); 
            }
        }

        // --- FULLSCREEN & ORIENTATION LOGIC ---
        function requestFullscreenAndLock() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen().catch(() => {});
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
        }

        let isRotated = false; let physicalW = window.innerWidth; let physicalH = window.innerHeight;
        let wrapperLeft = 0; let wrapperTop = 0;
        let camera, renderer;

        function handleResize() {
            physicalW = window.innerWidth; physicalH = window.innerHeight;
            let availW, availH;
            
            // Remove hardcoded target aspect ratio to allow full screen fill without black bars
            if (physicalH > physicalW) {
                isRotated = true; availW = physicalH; availH = physicalW;
            } else {
                isRotated = false; availW = physicalW; availH = physicalH;
            }
            
            GAME.width = availW; GAME.height = availH;
            UI.wrapper.style.width = availW + 'px'; UI.wrapper.style.height = availH + 'px';
            
            if (isRotated) {
                wrapperLeft = physicalW; wrapperTop = 0;
                UI.wrapper.style.transform = 'rotate(90deg)'; UI.wrapper.style.transformOrigin = 'top left';
                UI.wrapper.style.left = wrapperLeft + 'px'; UI.wrapper.style.top = wrapperTop + 'px';
            } else {
                wrapperLeft = 0; wrapperTop = 0;
                UI.wrapper.style.transform = 'none';
                UI.wrapper.style.left = '0px'; UI.wrapper.style.top = '0px';
            }

            if (camera && renderer) {
                camera.aspect = GAME.width / GAME.height;
                camera.updateProjectionMatrix();
                renderer.setSize(GAME.width, GAME.height);
            }
        }
        window.addEventListener('resize', handleResize); handleResize();

        // --- 2. THREE.JS SETUP (MAIN GAME) ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

        camera = new THREE.PerspectiveCamera(40, GAME.width / GAME.height, 1.0, 1000);
        camera.position.set(0, 12, 60); 
        camera.lookAt(currentLookAt);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(GAME.width, GAME.height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 40, 20); scene.add(dirLight);

        // --- 3. STADIUM BUILDER ---
        const arenaGroup = new THREE.Group(); scene.add(arenaGroup);

        function createStadiumTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048; 
            canvas.height = 512;  
            const ctx = canvas.getContext('2d');
            
            // Grass stripes (run vertical on canvas -> horizontal across field depth)
            for(let i=0; i<2048; i+=128) {
                ctx.fillStyle = (i/128)%2===0 ? '#2d5a27' : '#264d21';
                ctx.fillRect(i, 0, 128, 512);
            }
            
            // Field Lines Configuration
            ctx.strokeStyle = 'rgba(255,255,255,0.85)';
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.lineWidth = 6;
            
            const cx = 1024;
            const cy = 256;
            
            // Outer Bounds
            ctx.strokeRect(3, 3, 2042, 506);
            
            // Center Line
            ctx.beginPath();
            ctx.moveTo(cx, 0);
            ctx.lineTo(cx, 512);
            ctx.stroke();
            
            // Center Circle
            ctx.beginPath();
            ctx.arc(cx, cy, 130, 0, Math.PI*2);
            ctx.stroke();
            
            // Center Dot
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, Math.PI*2);
            ctx.fill();
            
            // --- Left Goal Area ---
            // Left Penalty Box
            ctx.strokeRect(0, cy - 160, 280, 320);
            // Left Goal Box
            ctx.strokeRect(0, cy - 70, 100, 140);
            // Left Penalty Spot
            ctx.beginPath(); ctx.arc(200, cy, 6, 0, Math.PI*2); ctx.fill();
            // Left Penalty Arc (math sets angles exactly at box intersection)
            ctx.beginPath();
            ctx.arc(200, cy, 100, -0.6435, 0.6435);
            ctx.stroke();

            // --- Right Goal Area ---
            // Right Penalty Box
            ctx.strokeRect(2048 - 280, cy - 160, 280, 320);
            // Right Goal Box
            ctx.strokeRect(2048 - 100, cy - 70, 100, 140);
            // Right Penalty Spot
            ctx.beginPath(); ctx.arc(2048 - 200, cy, 6, 0, Math.PI*2); ctx.fill();
            // Right Penalty Arc
            ctx.beginPath();
            ctx.arc(2048 - 200, cy, 100, Math.PI - 0.6435, Math.PI + 0.6435);
            ctx.stroke();
            
            // --- Corner Arcs ---
            const cornerR = 30;
            ctx.beginPath(); ctx.arc(0, 0, cornerR, 0, Math.PI/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 512, cornerR, Math.PI*1.5, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(2048, 0, cornerR, Math.PI/2, Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(2048, 512, cornerR, Math.PI, Math.PI*1.5); ctx.stroke();

            const texture = new THREE.CanvasTexture(canvas);

        function spawnParticles(x, y, colorHexStr, count, speed = 1, life = 30) {
            const mat = new THREE.MeshBasicMaterial({ color: colorHexStr });
            for(let i=0; i<count; i++) {
                const mesh = new THREE.Mesh(particleGeo, mat);
                mesh.position.set(x + (Math.random()-0.5), y + (Math.random()-0.5), 0);
                scene.add(mesh);
                particles.push({
                    mesh: mesh, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed,
                    vz: (Math.random() - 0.5) * speed * 0.5, life: life, maxLife: life
                });
            }
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
                p.mesh.rotation.x += p.vx; p.mesh.rotation.y += p.vy;
                p.life--; p.mesh.scale.setScalar(p.life / p.maxLife);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        // --- 5. ENTITIES (BALL & CAR) ---
        
        function createBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Mid Grey Hex Pattern Background
            ctx.fillStyle = '#7a7d80';
            ctx.fillRect(0, 0, 1024, 512);

            ctx.strokeStyle = '#5a5d60'; 
            ctx.lineWidth = 2;
            const a = 12;
            const b = a * Math.sqrt(3) / 2;
            for (let y = -b; y < 512 + b*2; y += b*2) {
                for (let x = -a; x < 1024 + a*3; x += a*3) {
                    for (let offset of [[0,0], [a*1.5, b]]) {
                        const cx = x + offset[0];
                        const cy = y + offset[1];
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = i * Math.PI / 3;
                            ctx.lineTo(cx + a * Math.cos(angle), cy + a * Math.sin(angle));
                        }
                        ctx.closePath(); ctx.stroke();
                    }
                }
            }

            // Light Grey "Inner" Panels (Equator band)
            ctx.fillStyle = '#9aa0a3';
            ctx.fillRect(0, 128, 1024, 256);
            
            // Add some panel lines in the light grey area
            ctx.strokeStyle = '#7a7d80';
            ctx.lineWidth = 4;
            for(let i=0; i<1024; i+=128) {
                ctx.beginPath(); ctx.moveTo(i, 128); ctx.lineTo(i, 384); ctx.stroke();
            }

            // Dark Grey Seams
            ctx.fillStyle = '#151618';
            ctx.fillRect(0, 120, 1024, 16);
            ctx.fillRect(0, 376, 1024, 16);
            
            // Vertical Seams
            for(let i=0; i<4; i++) {
                ctx.fillRect(i * 256 - 12, 0, 24, 512);
            }

            // Mint Green Dots on seam intersections
            ctx.fillStyle = '#5ee0b4';
            for(let i=0; i<4; i++) {
                const cx = i * 256;
                ctx.beginPath(); ctx.arc(cx, 128, 10, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx, 384, 10, 0, Math.PI*2); ctx.fill();
            }

            // Cyan Cores (Simulated flush side modules)
            const drawGlow = (x, y) => {
                // Outer dark ring
                ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI*2); 
                ctx.fillStyle = '#151618'; ctx.fill();
                
                // Claw simulation
                ctx.fillStyle = '#45484b';
                ctx.fillRect(x - 65, y - 12, 130, 24);
                ctx.fillRect(x - 12, y - 65, 24, 130);

                // Inner glow
                ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI*2); 
                ctx.fillStyle = '#5ee0b4'; ctx.fill();
                
                // Core center
                ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); 
                ctx.fillStyle = '#e0fcf2'; ctx.fill();
            };
            
            drawGlow(256, 256);
            drawGlow(768, 256);

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.anisotropy = 4;
            return tex;
        }

        class Ball {
            constructor() {
                this.radius = 2.8;
                this.pos = new THREE.Vector2(0, this.radius);
                this.vel = new THREE.Vector2(0, 0);
                this.angularVel = 0;
                this.rotation = 0;
                this.isTouchingGround = false;
                this.isExploded = false;
                
                this.mesh = new THREE.Group();

                // Detailed Sci-Fi Ball Material mapped onto a single seamless sphere
                const ballTex = createBallTexture();
                const ballMat = new THREE.MeshStandardMaterial({ 
                    map: ballTex, 
                    roughness: 0.6, 
                    metalness: 0.3 
                });

                // 1. A single flawless sphere geometry
                const sphereGeo = new THREE.SphereGeometry(this.radius, 32, 32);
                const sphere = new THREE.Mesh(sphereGeo, ballMat);
                this.mesh.add(sphere);

                // Ambient glow light inside the sphere
                const glowLight = new THREE.PointLight(0x5ee0b4, 1.5, 12);
                this.mesh.add(glowLight);

                scene.add(this.mesh);
            }
            
            reset() {
                this.pos.set(0, this.radius);
                this.vel.set(0, 0);
                this.angularVel = 0;
                this.isTouchingGround = false;
                this.isExploded = false;
                this.mesh.visible = true; // Ensure ball reappears after explosion
                this.updateMesh();
            }

            update() {
                if (GAME.state !== 'PLAYING' && GAME.state !== 'POST_GOAL') return;
                if (this.isExploded) return; // Completely freeze physics and trails when exploded

                this.isTouchingGround = false; // Reset collision flag every frame

                this.vel.y -= GAME.gravity * 0.45; // Decreased gravity effect so slower balls still arc nicely
                
                // Drag (decreased drag so the ball glides further despite starting slower)
                this.vel.multiplyScalar(0.992);
                
                // Spin Dynamics
                this.angularVel *= 0.98; // Slightly increased drag to normalize spin over time
                
                // SPIN GOVERNOR: Differentiate between backspin and topspin
                // If velocity X and angular velocity share the same sign, the ball is rolling backwards relative to its movement
                const isBackspin = (this.vel.x * this.angularVel) > 0;
                
                if (isBackspin) {
                    const maxBackspin = 0.06; // Increased to allow more visible backspin
                    this.angularVel = Math.max(-maxBackspin, Math.min(maxBackspin, this.angularVel));
                } else {
                    const maxTopspin = 0.35; // Increased to allow more aggressive topspin
                    this.angularVel = Math.max(-maxTopspin, Math.min(maxTopspin, this.angularVel));
                }

                this.pos.add(this.vel);
                this.rotation += this.angularVel;

                // Speed Trail Effect
                const speed = this.vel.length();
                if (speed > 0.4) {
                    const isSuperFast = speed > 0.8;
                    const trailColor = isSuperFast ? '#ffaa00' : '#ffffff';
                    const spawnChance = isSuperFast ? 1.0 : 0.4;
                    if (Math.random() < spawnChance) {
                        spawnParticles(this.pos.x - this.vel.x, this.pos.y - this.vel.y, trailColor, isSuperFast ? 2 : 1, 0.05, 12);
                    }
                }

                // Wall collisions
                const bounce = 0.7;
                const S = 6; // Steeper Slope Radius (matches visual)
                let hitSlope = false;

                // Left Curved Slope Collision
                const cxL = -GAME.arena.width + S;
                const cyL = S;
                if (this.pos.x < cxL && this.pos.y < cyL) {
                    const dx = this.pos.x - cxL;
                    const dy = this.pos.y - cyL;
                    const dist = Math.hypot(dx, dy);
                    if (dist > S - this.radius) {
                        const overlap = dist - (S - this.radius);
                        const nx = -dx / dist; // Normal points to center of curve
                        const ny = -dy / dist;
                        
                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;
                        
                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.sub(new THREE.Vector2(nx, ny).multiplyScalar(dot * (1 + bounce)));
                            this.angularVel += this.vel.x * 0.05;
                        }
                        hitSlope = true;
                    }
                } 
                // Right Curved Slope Collision
                else if (this.pos.x > GAME.arena.width - S && this.pos.y < cyL) {
                    const cxR = GAME.arena.width - S;
                    const dx = this.pos.x - cxR;
                    const dy = this.pos.y - cyL;
                    const dist = Math.hypot(dx, dy);
                    if (dist > S - this.radius) {
                        const overlap = dist - (S - this.radius);
                        const nx = -dx / dist;
                        const ny = -dy / dist;
                        
                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;
                        
                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.sub(new THREE.Vector2(nx, ny).multiplyScalar(dot * (1 + bounce)));
                            this.angularVel -= this.vel.x * 0.05;
                        }
                        hitSlope = true;
                    }
                }
                
                // Floor
                if (!hitSlope && this.pos.y <= this.radius + 0.05) {
                    this.pos.y = this.radius;
                    this.vel.y *= -bounce;
                    
                    // Anti-reversal spin friction
                    let origVx = this.vel.x;
                    let dV = this.angularVel * 0.08; // Increased grip transfer from 0.05 for punchier spin interactions
                    
                    // Hard cap the maximum velocity change from a pinch
                    dV = Math.max(-0.25, Math.min(0.25, dV)); // Increased cap to allow slightly more speed manipulation
                    
                    // Clamp friction to strictly prevent horizontal direction reversal
                    if (origVx > 0 && origVx - dV < 0) dV = origVx;
                    else if (origVx < 0 && origVx - dV > 0) dV = origVx;
                    
                    this.vel.x -= dV;
                    this.angularVel += dV * 0.5; // Absorb some rotational momentum
                    this.isTouchingGround = true;
                }
                
                // Ceiling
                if (this.pos.y > GAME.arena.height - this.radius) {
                    this.pos.y = GAME.arena.height - this.radius;
                    this.vel.y *= -0.25; // Much softer ceiling bounce
                }

                // Walls & Goal Net Collisions
                const aw = GAME.arena.width;
                const ah = GAME.arena.height;
                
                // Back of Goals
                if (this.pos.x < -aw - 8 + this.radius) {
                    this.pos.x = -aw - 8 + this.radius;
                    this.vel.x *= -bounce;
                }
                if (this.pos.x > aw + 8 - this.radius) {
                    this.pos.x = aw + 8 - this.radius;
                    this.vel.x *= -bounce;
                }

                // Solid wall blocks (AABB collision for perfect corners and flat walls)
                const resolveAABB = (bx, by, bw, bh) => {
                    let closestX = Math.max(bx, Math.min(this.pos.x, bx + bw));
                    let closestY = Math.max(by, Math.min(this.pos.y, by + bh));
                    let dx = this.pos.x - closestX;
                    let dy = this.pos.y - closestY;
                    
                    // If center is exactly inside the box, push to nearest edge
                    if (dx === 0 && dy === 0) {
                        const min = Math.min(this.pos.x - bx, (bx + bw) - this.pos.x, this.pos.y - by, (by + bh) - this.pos.y);
                        if (min === (by + bh) - this.pos.y) dy = this.pos.y - (by + bh);
                        else if (min === this.pos.y - by) dy = this.pos.y - by;
                        else if (min === (bx + bw) - this.pos.x) dx = this.pos.x - (bx + bw);
                        else dx = this.pos.x - bx;
                    }

                    const distSq = dx * dx + dy * dy;
                    if (distSq < this.radius * this.radius) {
                        const dist = Math.sqrt(distSq);
                        const overlap = this.radius - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;

                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;

                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.x -= nx * dot * (1 + bounce);
                            this.vel.y -= ny * dot * (1 + bounce);
                            
                            // Anti-reversal Friction on flat ground surfaces
                            if (Math.abs(ny) > 0.5) {
                                let origVx = this.vel.x;
                                let dV = this.angularVel * 0.08; // Matched new floor grip transfer
                                dV = Math.max(-0.25, Math.min(0.25, dV)); // Matched new pinch cap
                                
                                // Clamp to strictly prevent reversal
                                if (origVx > 0 && origVx - dV < 0) dV = origVx;
                                else if (origVx < 0 && origVx - dV > 0) dV = origVx;
                                
                                this.vel.x -= dV;
                                this.angularVel += dV * 0.5;
                                if (ny > 0.5) this.isTouchingGround = true; 
                            }
                        }
                    }
                };

                resolveAABB(-aw - 8, 28, 8, ah - 28); // Left Top Wall
                resolveAABB(-aw - 8, -10, 8, 18);     // Left Bottom Wall
                resolveAABB(aw, 28, 8, ah - 28);      // Right Top Wall
                resolveAABB(aw, -10, 8, 18);          // Right Bottom Wall

                this.updateMesh();
            }
            
            updateMesh() {
                this.mesh.position.set(this.pos.x, this.pos.y, 0);
                this.mesh.rotation.z = this.rotation;
            }
        }

        class Car {

                    this.pitchGroup.add(nosePillar);

                    bumper.position.set(2.2, 0.15, 0);
                    this.pitchGroup.add(bumper);

                    // Stacked Dual Headlights
                    [-0.6, 0.6].forEach(z => {
