        function resolveCarBallCollision(car, ball) {
            // Treat car roughly as two spheres (front and back) to interact nicely with ball
            const carLen = 1.5; // Half length approx
            const dirX = car.facingLeft ? -1 : 1;
            const cosA = Math.cos(car.angle); const sinA = Math.sin(car.angle);
            
            const pFront = new THREE.Vector2(car.pos.x + dirX*carLen*cosA, car.pos.y + carLen*sinA);
            const pBack = new THREE.Vector2(car.pos.x - dirX*carLen*cosA, car.pos.y - carLen*sinA);
            
            [pFront, pBack, car.pos].forEach(point => {
                const dist = point.distanceTo(ball.pos);
                const combinedRadii = 1.0 + ball.radius; // car hit sphere radius ~1.0
                
                if (dist < combinedRadii) {
                    const overlap = combinedRadii - dist;
                    const normal = ball.pos.clone().sub(point).normalize();
                    
                    // Push ball out
                    ball.pos.add(normal.clone().multiplyScalar(overlap));
                    
                    // Transfer velocity
                    const relVel = ball.vel.clone().sub(car.vel);
                    const velAlongNormal = relVel.dot(normal);
                    
                    if (velAlongNormal < 0) {
                        const restitution = 0.6; 
                        const impulse = -(1 + restitution) * velAlongNormal * 0.55; // Lowered initial speed burst
                        
                        // Add base impulse + a specific upward "arch" boost
                        let push = normal.clone().multiplyScalar(impulse + 0.08);
                        push.y += 0.12 + Math.abs(push.x) * 0.15; // Adjusted upward pop
                        
                        ball.vel.add(push);
                        
                        // Spin contribution: Slightly randomized but governed by clamp in update()
                        ball.angularVel += (Math.random() - 0.5) * 0.25; // Increased hit spin transfer
                        
                        // Dodge hit logic 
                        if (car.flipTimer > 0) {
                            let dodgePush = normal.clone().multiplyScalar(0.40); // Lowered dodge burst speed
                            dodgePush.y += 0.20; 
                            ball.vel.add(dodgePush);
                            spawnParticles(ball.pos.x, ball.pos.y, car.color, 20, 0.8);
                        } else {
                            spawnParticles(ball.pos.x, ball.pos.y, '#fff', 5, 0.3);
                        }
                    }
                }
            });
        }

        function checkCollisions() {
            if (GAME.state !== 'PLAYING' && GAME.state !== 'POST_GOAL') return;

            // Car vs Ball (Run during gameplay and celebrations)
            resolveCarBallCollision(p1, ball);
            resolveCarBallCollision(p2, ball);

            // Goal detection (Only score points while actively playing)
            if (GAME.state === 'PLAYING') {
                const goalThreshold = GAME.arena.width + ball.radius; // Entire ball must pass the line
                if (ball.pos.y > 8 && ball.pos.y < 28) {
                    if (ball.pos.x > goalThreshold) {
                        // Blue scores (Left car hits into right goal)
                        explodeBall();
                        p1.score++;
                        triggerRoundEnd("BLUE SCORES!");
                    } else if (ball.pos.x < -goalThreshold) {
                        // Orange scores
                        explodeBall();
                        p2.score++;
                        triggerRoundEnd("ORANGE SCORES!");
                    }
                }
            }
        }

        // --- 7. INPUT HANDLING ---
        window.addEventListener('keydown', e => {
            if (['Space', 'KeyW', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
            if (e.code === 'Digit0') GAME.testingMode = !GAME.testingMode;
            if (e.code === 'KeyA') INPUT.left = true; 
            if (e.code === 'KeyD') INPUT.right = true;
            if (e.code === 'KeyW') INPUT.jump = true; 
            if (e.code === 'ArrowUp') INPUT.up = true; 
            if (e.code === 'ArrowDown') INPUT.down = true; 
            if (e.code === 'Space') INPUT.boost = true;
        }, {passive: false});

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyA') INPUT.left = false; 
            if (e.code === 'KeyD') INPUT.right = false;
            if (e.code === 'KeyW') INPUT.jump = false; 
            if (e.code === 'ArrowUp') INPUT.up = false; 
            if (e.code === 'ArrowDown') INPUT.down = false; 
            if (e.code === 'Space') INPUT.boost = false;
        });

        function getMappedTouch(touch) {
            if (!isRotated) {
                return { clientX: touch.clientX - wrapperLeft, clientY: touch.clientY - wrapperTop, identifier: touch.identifier };
            } else {
                return { clientX: touch.clientY - wrapperTop, clientY: wrapperLeft - touch.clientX, identifier: touch.identifier };
            }
        }

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const joyArea = document.getElementById('joystick-area');
        
        let joyActive = false; let joyOrigin = {x: 0, y: 0}; let joyTouchId = null;

        joyArea.addEventListener('touchstart', e => {
            e.preventDefault();
            if (joyActive) return; 
            const touch = getMappedTouch(e.changedTouches[0]);
            joyTouchId = touch.identifier; joyActive = true; 
            joyOrigin.x = touch.clientX; joyOrigin.y = touch.clientY;
            
            joyBase.style.display = 'block';
            joyBase.style.left = touch.clientX + 'px'; joyBase.style.top = touch.clientY + 'px';
            joyStick.style.left = '50%'; joyStick.style.top = '50%';
            joyStick.style.transform = `translate(-50%, -50%)`;
            
            INPUT.joyActive = true; INPUT.joyX = 0; INPUT.joyY = 0;
        });

        joyArea.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!joyActive) return;
            let touch = null;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) { touch = getMappedTouch(e.changedTouches[i]); break; }
            }
            if(!touch) return; 

            const dx = touch.clientX - joyOrigin.x; const dy = touch.clientY - joyOrigin.y;
            const maxR = 40; const dist = Math.hypot(dx, dy);
            let nx = dx, ny = dy;
            if (dist > maxR) { nx = (dx / dist) * maxR; ny = (dy / dist) * maxR; }
            
            joyStick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
            INPUT.joyX = dx; INPUT.joyY = dy;
            INPUT.left = dx < -20; INPUT.right = dx > 20;
        });

        function endJoy(e) { 
            if (!joyActive) return;
            let trackedTouchLifted = false;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) { trackedTouchLifted = true; break; }
            }
            if (!trackedTouchLifted) return;
            e.preventDefault(); 
            joyActive = false; joyTouchId = null; joyBase.style.display = 'none'; 
            INPUT.left = false; INPUT.right = false; 
            INPUT.joyActive = false; INPUT.joyX = 0; INPUT.joyY = 0;
        }
        
        joyArea.addEventListener('touchend', endJoy); joyArea.addEventListener('touchcancel', endJoy);

        // --- 8. MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;
            
            if (GAME.state === 'MENU') {
                if (p1 && p2) {
                    p1.visualRotY += 0.02; p2.visualRotY -= 0.02;
                    p1.updateMesh(); p2.updateMesh();
                }
                camera.position.lerp(new THREE.Vector3(0, 16, 45), 0.05); // Zoomed in
                targetLookAt.set(0, 8, 0);
            }
            else if (GAME.state === 'SHOP') {
                if (p1 && p2) { p1.visualRotY += 0.02; p2.visualRotY -= 0.02; p1.updateMesh(); p2.updateMesh(); }
                const isMobile = GAME.width < 768;
                camera.position.lerp(new THREE.Vector3(-6, 4, isMobile ? 30 : 20), 0.05);
                targetLookAt.set(-6, 1.5, 0);
            }
            else if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER' || GAME.state === 'POST_GOAL') {
                p1.update(INPUT.left, INPUT.right, INPUT.jump, INPUT.up, INPUT.down, INPUT.boost, INPUT.joyX, INPUT.joyY, INPUT.joyActive);
                runAI(p2, p1, ball);
                
                if (ball) ball.update();
                
                checkCollisions(); // Method internally guards against double-scoring
                
                if (GAME.state === 'PLAYING') {
                    // Timer logic
                    if (!GAME.isOvertime && !GAME.timeUp) {
                        GAME.timeRemaining -= delta;
                        if (GAME.timeRemaining <= 0) {
                            GAME.timeRemaining = 0;
                            GAME.timeUp = true;
                        }
                    }
                    
                    if (GAME.isOvertime) {
                        UI.timerDisplay.innerText = "+OVERTIME";
                        UI.timerDisplay.style.color = "#f59e0b";
                    } else {
                        const mins = Math.floor(GAME.timeRemaining / 60);
                        const secs = Math.floor(GAME.timeRemaining % 60).toString().padStart(2, '0');
                        UI.timerDisplay.innerText = `${mins}:${secs}`;
                    }

                    // Zero-Second Rule logic
                    if (GAME.timeUp && !GAME.isOvertime && ball && ball.isTouchingGround) {
                        if (p1.score === p2.score) {
                            GAME.isOvertime = true;
                            UI.timerDisplay.innerText = "+OVERTIME";
                            UI.timerDisplay.style.color = "#f59e0b";
                            triggerRoundEnd("OVERTIME!");
                        } else {
                            endGame(p1.score > p2.score ? "BLUE" : "ORANGE", p1.score > p2.score ? p1.color : p2.color);
                        }
                    }
                }
                
                if(p1 && p2 && ball) {
                    // Dynamic camera to keep P1 (Blue) and Ball on screen
                    const focusX = (p1.pos.x + ball.pos.x) / 2;
                    let focusY = Math.max(8, (p1.pos.y + ball.pos.y) / 2);
                    
                    const dx = Math.abs(p1.pos.x - ball.pos.x);
                    const dy = Math.abs(p1.pos.y - ball.pos.y);
                    
                    // Add padding around the targets
                    const padX = 15; 
                    const padY = 15;
                    
                    const fovRad = (camera.fov * Math.PI) / 180;
                    const aspect = camera.aspect;
                    
                    // Calculate required Z distance to fit the width and height
                    const targetZX = ((dx + padX) / 2) / (Math.tan(fovRad / 2) * aspect);
                    const targetZY = ((dy + padY) / 2) / Math.tan(fovRad / 2);
                    
                    // Take the larger Z, and clamp it so it doesn't get too close or too far
                    let targetZ = Math.max(targetZX, targetZY);
                    targetZ = Math.max(35, Math.min(80, targetZ)); 

                    // Ensure the view shows just a little above the roof (roof is at Y=41)
                    const topEdge = focusY + (targetZ * Math.tan(fovRad / 2));
                    const maxTopEdge = 44; // Give it a small padding above the roof mesh
                    if (topEdge > maxTopEdge) {
                        focusY -= (topEdge - maxTopEdge);
                    }
                    focusY = Math.max(8, focusY); // Prevent panning under the floor

                    camera.position.lerp(new THREE.Vector3(focusX, focusY + 4, targetZ), 0.08);
                    targetLookAt.set(focusX, focusY, 0);
                }
            }
            
            currentLookAt.lerp(targetLookAt, 0.1);
            camera.lookAt(currentLookAt);

            updateParticles();
            renderer.render(scene, camera);

            if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER') {
                updateHUD();
            }
        }

        setupMenuCars();
        animate();

    </script>
</body>
