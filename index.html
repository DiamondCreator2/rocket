            reset() {
                this.pos.set(this.isP1 ? -15 : 15, 1.0);
                this.vel.set(0, 0);
                this.facingLeft = !this.isP1;
                this.visualRotY = this.isP1 ? 0 : Math.PI;
                this.angle = 0;
                this.angularVel = 0;
                this.boostFuel = 100;
                this.hasDoubleJump = true;
                this.jumpHoldTimer = 0;
                this.flipTimer = 0;
                this.flipDir = 0;
                this.isKickoff = true;
                this.kickoffStrat = Math.floor(Math.random() * 4); 
                this.kickoffTimer = 0;
                this.updateMesh();
            }

            update(inputLeft, inputRight, inputJump, inputUp, inputDown, inputBoost, joyX, joyY, joyActive) {
                if (GAME.state === 'MENU' || GAME.state === 'SHOP') return;
                
                if (GAME.state === 'ROUND_OVER') {
                    inputLeft = inputRight = inputJump = inputUp = inputDown = inputBoost = false;
                    joyActive = false; joyX = joyY = 0;
                }

                // Aiming & Facing
                if (joyActive) {
                    if (joyX < -10) this.facingLeft = true;
                    else if (joyX > 10) this.facingLeft = false;
                } else {
                    if (inputLeft) this.facingLeft = true;
                    else if (inputRight) this.facingLeft = false;
                }

                const targetRotY = this.facingLeft ? Math.PI : 0;
                let diffY = targetRotY - this.visualRotY;
                while(diffY < -Math.PI) diffY += Math.PI*2;
                while(diffY > Math.PI) diffY -= Math.PI*2;
                this.visualRotY += diffY * 0.25; 

                let driveInput = 0;
                if (inputLeft) driveInput -= 1;
                if (inputRight) driveInput += 1;

                let isFlipping = false;
                if (this.flipTimer > 0) {
                    this.flipTimer--;
                    if (this.flipDir) {
                        // Smoothly rotate a full 360 degrees over 15 frames
                        this.angle += this.flipDir * (Math.PI * 2 / 15);
                        this.angularVel = 0;
                        isFlipping = true;
                    }
                }

                // Prepare slope detection variables for Visual Snap
                const S = 6; // Steeper Slope Radius
                let onSlope = false;
                let slopeAngle = 0;

                if (this.isGrounded) {
                    this.hasDoubleJump = true;
                    this.vel.x += driveInput * this.accel;
                    this.vel.x *= 0.88; // Friction
                    
                    // Snap flat & Auto-flip
                    let targetFlat = 0; // Always target upright
                    if (this.pos.y < 6 && this.pos.x < -GAME.arena.width + 6) targetFlat = Math.PI / 4;
                    else if (this.pos.y < 6 && this.pos.x > GAME.arena.width - 6) targetFlat = -Math.PI / 4;

                    let diffFlat = targetFlat - this.angle;
                    while(diffFlat > Math.PI) diffFlat -= Math.PI*2;
                    while(diffFlat < -Math.PI) diffFlat += Math.PI*2;
                    this.angle += diffFlat * 0.25; 
                    this.angularVel = 0;
                    
                    if (Math.cos(this.angle) < -0.5 && !inputJump) {
                        this.pos.y += 0.3; // Give it room to roll over visually
                    }
                    
                    if (inputJump && !this.jumpPressedLast) {
                        this.vel.y = this.jumpForce; this.isGrounded = false;
                        this.jumpHoldTimer = 12; // Max frames to hold jump
                        
                        this.angle += 0.2;
                        this.angularVel += 0.02;

                        spawnParticles(this.pos.x, 0, '#aaa', 10, 0.2, 15); 
                    }
                } else {
                    // Variable Jump Height
                    if (!inputJump) {
                        this.jumpHoldTimer = 0;
                    } else if (this.jumpHoldTimer > 0) {
                        this.vel.y += this.jumpHoldForce;
                        this.jumpHoldTimer--;
                    }

                    if (!isFlipping) {
                        // Airborne rotation
                        if (joyActive && Math.hypot(joyX, joyY) > 10) {
                            let joyAngle = Math.atan2(-joyY, joyX); 
                            let targetPitch = this.facingLeft ? (Math.PI - joyAngle) : joyAngle;
                            
                            let diffPitch = targetPitch - this.angle;
                            while(diffPitch > Math.PI) diffPitch -= Math.PI*2;
                            while(diffPitch < -Math.PI) diffPitch += Math.PI*2;
                            
                            // Smoother joystick tilt using angular velocity instead of instant snapping (reduced sensitivity)
                            this.angularVel += diffPitch * 0.04; 
                        } else if (!joyActive) {
                            // Keyboard: Lowered sensitivity for easier, less twitchy control
                            if (inputUp) this.angularVel += 0.02;
                            if (inputDown) this.angularVel -= 0.02;
                        }
                        
                        // Very slight gravitational tilt depending on current angle (rear-heavy center of mass)
                        this.angularVel += 0.0025 * Math.cos(this.angle); 

                        this.angle += this.angularVel;
                        this.angularVel *= 0.88; // Keep the same low drag for smoothness
                    }
                    
                    this.vel.x += driveInput * this.airAccel;
                    
                    // Double Jump / Dodge
                    if (inputJump && !this.jumpPressedLast && this.hasDoubleJump && this.flipTimer === 0) {
                        this.hasDoubleJump = false;
                        this.flipTimer = 15;
                        this.flipDir = 0;
                        
                        const hasDirection = driveInput !== 0 || (joyActive && Math.hypot(joyX, joyY) > 15);

                        if (!hasDirection) {
                            // Pure vertical double jump
                            this.vel.y += this.doubleJumpForce * 1.5;
                            this.angle += 0.15;
                            this.angularVel += 0.015;
                        } else {
                            // Directed dodge flip
                            let dodgeGlobalDir = driveInput !== 0 ? Math.sign(driveInput) : Math.sign(joyX);
                            
                            this.vel.x += dodgeGlobalDir * this.doubleJumpForce;
                            this.vel.y += this.doubleJumpForce * 0.3; // Small hop
                            
                            // Always front flip forward, back flip backward
                            let isDodgeForward = (this.facingLeft && dodgeGlobalDir < 0) || (!this.facingLeft && dodgeGlobalDir > 0);
                            this.flipDir = isDodgeForward ? -1 : 1; 
                        }
                        
                        spawnParticles(this.pos.x, this.pos.y, '#fff', 15, 0.5, 20);
                    }
                }

                this.jumpPressedLast = inputJump;
                this.vel.y -= GAME.gravity;

                // Boost
                if (inputBoost && this.boostFuel > 0) {
                    this.boostFuel -= 0.4; 
                    this.boostDelay = 20;  
                    
                    const cosA = Math.cos(this.angle); const sinA = Math.sin(this.angle);
                    const dirX = this.facingLeft ? -1 : 1;
                    
                    this.vel.x += dirX * cosA * this.boostForce; 
                    this.vel.y += sinA * this.boostForce;
                    
                    // Enforce a slightly lower top speed while boosting
                    const currentSpeed = this.vel.length();
                    if (currentSpeed > this.maxBoostSpeed) {
                        this.vel.multiplyScalar(0.97); 
                    }
                    
                    spawnParticles(this.pos.x - dirX * cosA * 2, this.pos.y - sinA * 2, this.color, 3, 0.4, 15);
                } else if (this.isGrounded) {
                    if (this.boostDelay > 0) {
                        this.boostDelay--;
                    } else if (this.boostFuel < 100) {
                        this.boostFuel += 1.5;
                        if (this.boostFuel > 100) this.boostFuel = 100;
                    }
                }

                this.pos.add(this.vel);

                // Arena Bounds, Slopes, and Hollow Goals
                let currentRadius = 1.60 - (Math.cos(this.angle) * 0.35); 
                const cxL = -GAME.arena.width + S;
                const cyL = S;

                // Left Curved Slope
                if (this.pos.x < cxL && this.pos.y < cyL) {
                    const dx = this.pos.x - cxL;
                    const dy = this.pos.y - cyL;
                    const dist = Math.hypot(dx, dy);
                    if (dist > S - currentRadius) {
                        const overlap = dist - (S - currentRadius);
                        const nx = -dx / dist;
                        const ny = -dy / dist;
                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;
                        onSlope = true;
                        slopeAngle = Math.atan2(ny, nx) - Math.PI/2;
                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.x -= nx * dot;
                            this.vel.y -= ny * dot;
                        }
                    }
                } 
                // Right Curved Slope
                else if (this.pos.x > GAME.arena.width - S && this.pos.y < cyL) {
                    const cxR = GAME.arena.width - S;
                    const dx = this.pos.x - cxR;
                    const dy = this.pos.y - cyL;
                    const dist = Math.hypot(dx, dy);
                    if (dist > S - currentRadius) {
                        const overlap = dist - (S - currentRadius);
                        const nx = -dx / dist;
                        const ny = -dy / dist;
                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;
                        onSlope = true;
                        slopeAngle = Math.atan2(ny, nx) - Math.PI/2;
                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.x -= nx * dot;
                            this.vel.y -= ny * dot;
                        }
                    }
                }

                // Check Goal Boundaries & Walls
                const aw = GAME.arena.width;
                const ah = GAME.arena.height;
                let inGoalFloor = false;

                // Back of goals
                if (this.pos.x < -aw - 8 + currentRadius) { this.pos.x = -aw - 8 + currentRadius; this.vel.x *= -0.5; }
                if (this.pos.x > aw + 8 - currentRadius) { this.pos.x = aw + 8 - currentRadius; this.vel.x *= -0.5; }
                
                // Ceiling of goals
                if (this.pos.y > 28 - currentRadius && (this.pos.x < -aw || this.pos.x > aw)) {
                    this.pos.y = 28 - currentRadius; this.vel.y *= -0.5;
                }

                // Solid wall blocks (AABB collision for perfect corners and flat walls)
                const resolveCarAABB = (bx, by, bw, bh) => {
                    let closestX = Math.max(bx, Math.min(this.pos.x, bx + bw));
                    let closestY = Math.max(by, Math.min(this.pos.y, by + bh));
                    let dx = this.pos.x - closestX;
                    let dy = this.pos.y - closestY;
                    
                    if (dx === 0 && dy === 0) {
                        const min = Math.min(this.pos.x - bx, (bx + bw) - this.pos.x, this.pos.y - by, (by + bh) - this.pos.y);
                        if (min === (by + bh) - this.pos.y) dy = this.pos.y - (by + bh);
                        else if (min === this.pos.y - by) dy = this.pos.y - by;
                        else if (min === (bx + bw) - this.pos.x) dx = this.pos.x - (bx + bw);
                        else dx = this.pos.x - bx;
                    }

                    const distSq = dx * dx + dy * dy;
                    if (distSq < currentRadius * currentRadius) {
                        const dist = Math.sqrt(distSq);
                        const overlap = currentRadius - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;

                        this.pos.x += nx * overlap;
                        this.pos.y += ny * overlap;

                        const dot = this.vel.x * nx + this.vel.y * ny;
                        if (dot < 0) {
                            this.vel.x -= nx * dot * 1.5; 
                            this.vel.y -= ny * dot * 1.5;
                            if (ny > 0.5) inGoalFloor = true; 
                        }
                    }
                };

                resolveCarAABB(-aw - 8, 28, 8, ah - 28); 
                resolveCarAABB(-aw - 8, -10, 8, 18);     
                resolveCarAABB(aw, 28, 8, ah - 28);      
                resolveCarAABB(aw, -10, 8, 18);          

                // Visual Car Rotation Snap
                if (this.isGrounded || inGoalFloor) {
                    let targetFlat = 0;
                    if (onSlope) { targetFlat = slopeAngle; }

                    let diffFlat = targetFlat - this.angle;
                    while(diffFlat > Math.PI) diffFlat -= Math.PI*2;
                    while(diffFlat < -Math.PI) diffFlat += Math.PI*2;
                    
                    this.angularVel += diffFlat * 0.08;
                    this.angularVel *= 0.82; 
                    this.angle += this.angularVel;
                    
                    if (Math.cos(this.angle) < -0.5 && !inputJump) {
                        this.pos.y += 0.2; 
                    }
                }

                // Ground Check
                if (inGoalFloor) {
                    this.isGrounded = true;
                    this.hasDoubleJump = true;
                    onSlope = true; 
                } else if (!onSlope && this.pos.y <= currentRadius) { 
                    this.pos.y = currentRadius; 
                    if (this.vel.y < 0) this.vel.y = 0; 
                    this.isGrounded = true; 
                    this.hasDoubleJump = true;
                } else if (onSlope) {
                    this.isGrounded = true; 
                    this.hasDoubleJump = true;
                } else { 
                    this.isGrounded = false; 
                }
                
                if (this.pos.y > GAME.arena.height - 1) { this.pos.y = GAME.arena.height - 1; this.vel.y *= -0.5; }

                while(this.angle > Math.PI) this.angle -= Math.PI*2;
                while(this.angle < -Math.PI) this.angle += Math.PI*2;
                this.updateMesh();
            }

            updateMesh() {
                this.yawGroup.position.x = this.pos.x;
                this.yawGroup.position.y = this.pos.y;
                this.yawGroup.rotation.y = this.visualRotY;
                
                this.pitchGroup.rotation.x = 0;
                this.pitchGroup.rotation.z = this.angle;

                const boostRatio = Math.max(0.0, this.boostFuel / 100);
                this.boostFillMat.uniforms.fill.value = boostRatio;
            }
        }

        let p1, p2, ball;

        function runAI(ai, opponent, ballTarget) {
            let left = false, right = false, jump = false, up = false, down = false, boost = false;
            let joyActive = false, joyX = 0, joyY = 0;

            if ((GAME.state === 'PLAYING' || GAME.state === 'POST_GOAL') && !GAME.testingMode) {
                
                // --- KICKOFF LOGIC ---
                if (ai.isKickoff) {
                    ai.kickoffTimer++;

                    if (Math.abs(ballTarget.pos.x) > 1 || ballTarget.pos.y > ballTarget.radius + 0.5 || ai.kickoffTimer > 150) {
                        ai.isKickoff = false;
                    } else {
                        const distToBall = Math.abs(ballTarget.pos.x - ai.pos.x);
                        const pushDir = ai.isP1 ? 1 : -1;
                        
                        if (ai.kickoffStrat === 0) { 
                            // Speed Jump / Chip Shot: Stop boosting early and jump precisely at the ball
                            if (pushDir === 1) right = true; else left = true;
                            
                            // Only boost if far away so he doesn't overshoot
                            if (distToBall > 5.5) {
                                boost = true;
                            }
                            
                            // Wait to jump until right next to the ball to chip it properly
                            if (distToBall < 3.2) {
                                jump = true;
                            }
                        } 
                        else if (ai.kickoffStrat === 1) { 
                            // Ground Pinch
                            if (pushDir === 1) right = true; else left = true;
                            boost = true;
                        } 
                        else if (ai.kickoffStrat === 2) { 
                            // Fake & Wait
                            if (distToBall > 7.5) {
                                if (pushDir === 1) right = true; else left = true;
                                boost = true;
                            } else {
                                // Brake only if we are still moving forward, otherwise sit perfectly still
                                if ((pushDir === 1 && ai.vel.x > 0.1) || (pushDir === -1 && ai.vel.x < -0.1)) {
                                    if (pushDir === 1) left = true; else right = true; // Brake
                                }
                            }
                        } 
                        else { 
                            // Power Dodge
                            if (pushDir === 1) right = true; else left = true;
                            
                            // Let off boost slightly earlier to tone down the raw power
                            if (distToBall > 6) {
                                boost = true;
                            }
                            
                            if (distToBall < 6 && distToBall > 3.5) {
                                jump = true; 
                            } else if (distToBall <= 3.5 && ai.hasDoubleJump) {
                                jump = true; 
                                joyActive = true; 
                                joyX = pushDir * 10; joyY = 0; 
                            }
                        }
                        
                        ai.update(left, right, jump, up, down, boost, joyX, joyY, joyActive);
                        return; 
                    }
                }

                // --- GOAL SECURE LOGIC (Don't save the ball for the opponent!) ---
                const oppGoalX = ai.isP1 ? GAME.arena.width : -GAME.arena.width;
                const distToOppGoal = Math.abs(ballTarget.pos.x - oppGoalX);
                const ballInGoalHeight = ballTarget.pos.y > 6 && ballTarget.pos.y < 30;
                const ballRollingIn = ai.isP1 ? ballTarget.vel.x > 0.15 : ballTarget.vel.x < -0.15;
                const aiBetweenBallAndGoal = ai.isP1 ? (ai.pos.x > ballTarget.pos.x) : (ai.pos.x < ballTarget.pos.x);

                if (distToOppGoal < 15 && ballInGoalHeight) {
                    if (aiBetweenBallAndGoal) {
                        // AI is stuck between the ball and the goal line! Get out of the way!
                        if (ai.isP1) { left = true; right = false; joyX = -10; } 
                        else { right = true; left = false; joyX = 10; }
                        boost = true; joyActive = true;
                        
                        if (Math.abs(ballTarget.pos.x - ai.pos.x) < 5) jump = true; // jump over it if too close
                        
                        ai.update(left, right, jump, up, down, boost, joyX, joyY, joyActive);
                        return;
                    } else if (ballRollingIn && Math.abs(ballTarget.vel.x) > 0.3) {
                        // Ball is already zooming in, just hit the brakes and watch!
                        if (ai.vel.x > 0.2) { left = true; right = false; }
                        else if (ai.vel.x < -0.2) { right = true; left = false; }
                        else { left = false; right = false; }
                        
                        if (Math.random() < 0.05) jump = true; // Celebrate hop
                        
                        ai.update(left, right, jump, up, down, boost, joyX, joyY, joyActive);
                        return;
                    }
                }

                if (!ai.aiTimer || ai.aiTimer <= 0) { 
                    ai.aiTimer = 30 + Math.random() * 60; 
                    const r = Math.random();
                    if (r < 0.6) ai.aiStrat = 'AGGRO'; 
                    else if (r < 0.8) ai.aiStrat = 'AIR_DRIBBLE'; 
                    else ai.aiStrat = 'DEFEND'; 
                    
                    ai.aimOffsetX = (Math.random() - 0.5) * 4;
                    ai.aimOffsetY = (Math.random() - 0.5) * 4;
                }
                ai.aiTimer--;

                const lookahead = 20; 
                let predX = ballTarget.pos.x + (ballTarget.vel.x * lookahead);
                let predY = ballTarget.pos.y + (ballTarget.vel.y * lookahead);
                
                predX = Math.max(-GAME.arena.width, Math.min(GAME.arena.width, predX));
                predY = Math.max(ballTarget.radius, Math.min(GAME.arena.height, predY));

                let targetX = predX;
                let targetY = predY;

                const exactDx = ballTarget.pos.x - ai.pos.x;
                const exactDy = ballTarget.pos.y - ai.pos.y;
                const exactDist = Math.hypot(exactDx, exactDy);

                let pushDir = ai.isP1 ? 1 : -1;
                let doingWallSetup = false;

                const inOwnHalf = ai.isP1 ? (ballTarget.pos.x < -10) : (ballTarget.pos.x > 10);
                const behindBall = ai.isP1 ? (ai.pos.x < ballTarget.pos.x) : (ai.pos.x > ballTarget.pos.x);
                const ballMovingToOwnGoal = ai.isP1 ? (ballTarget.vel.x < -0.1) : (ballTarget.vel.x > 0.1);
                
                if (inOwnHalf && ballMovingToOwnGoal) {
                    if (ballTarget.pos.y > 10 || exactDist > 15) {
                        targetX = -(pushDir * (GAME.arena.width + 4)); 
                    } else {
                        targetX = predX - (pushDir * 7); 
                    }
                }
                else if (inOwnHalf && behindBall && ballTarget.pos.y < 15 && ai.aiStrat !== 'DEFEND') {
                    pushDir = ai.isP1 ? -1 : 1;
                    doingWallSetup = true;
                }

                const aimDx = targetX - ai.pos.x;
                const aimDy = targetY - ai.pos.y;
                const aimDist = Math.hypot(aimDx, aimDy);

                const isLongDistance = Math.abs(aimDx) > 25; 
                const wrongSide = (aimDx * pushDir) < 0; 
                const isShooting = !wrongSide && (ai.isP1 ? ballTarget.pos.x > 0 : ballTarget.pos.x < 0) && exactDist < 15;

                if (ai.aiStrat === 'CONFUSED') {
                    if (Math.random() < 0.05) jump = true;
                    if (Math.random() < 0.02) boost = true;
                    if (Math.random() < 0.5) left = true; else right = true;
                } 
                else if (ai.isGrounded) {
                    if (wrongSide && !doingWallSetup) {
                        if (pushDir === 1) left = true; else right = true;
                        if (Math.abs(exactDx) < 10 && ballTarget.pos.y < 12) {
                            if (Math.random() < 0.1) jump = true; 
                        }
                        if (isLongDistance && Math.random() < 0.05) jump = true;
                    } else {
                        if (Math.abs(aimDx) > 1.5) {
                            if (aimDx > 0) right = true; else left = true;
                        }
                        
                        if (doingWallSetup) {
                            if (ballTarget.pos.y > 6 && exactDist < 12) {
                                if (Math.random() < 0.2) jump = true;
                            }
                        } else {
                            if (predY > 5.0 && Math.abs(aimDx) < 10) {
                                if (Math.random() < 0.3) jump = true; 
                            }
                            if (isLongDistance && Math.random() < 0.05) jump = true;
                        }
                    }
                } else {
                    joyActive = true;
                    if (wrongSide && !doingWallSetup) {
                        if (pushDir === 1) left = true; else right = true;
                        joyX = -pushDir * 10; 
                        joyY = 10; 
                        
                        if (Math.abs(exactDx) < 8 && ai.pos.y < ballTarget.pos.y + 3 && ai.hasDoubleJump) {
                            if (Math.random() < 0.2) jump = true;
                        }
                        else if (isLongDistance && ai.hasDoubleJump && Math.random() < 0.2) {
                            jump = true;
                            joyX = pushDir === 1 ? -10 : 10; 
                            joyY = 0;
                        }
                    } else {
                        if (aimDx < -1) left = true; else if (aimDx > 1) right = true;
                        
                        let targetAngX = aimDx;
                        let targetAngY = -aimDy;

                        if (ballTarget.pos.y > 10) {
                            const carryDir = ai.isP1 ? 1 : -1;
                            targetAngX = exactDx - (carryDir * 2.5); 
                            targetAngY = -(exactDy + 3); 
                        }

                        joyX = targetAngX + ai.aimOffsetX;
                        joyY = targetAngY + ai.aimOffsetY; 
                        
                        let targetAngle = Math.atan2(-joyY, joyX); 
                        let lanceAngle = ai.facingLeft ? (Math.PI - ai.angle) : ai.angle;
                        let angleDiff = targetAngle - lanceAngle;
                        while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
                        while(angleDiff < -Math.PI) angleDiff += Math.PI*2;

                        if (Math.abs(angleDiff) < 1.4 && exactDist > 3 && ai.boostFuel > 5) {
                            if (isShooting || (inOwnHalf && ballMovingToOwnGoal) || predY > 10) {
                                if (Math.random() < 0.9) boost = true;
                            } else {
                                if (Math.random() < 0.4) boost = true;
                            }
                        }
                        
                        if (exactDist < 10 && Math.abs(angleDiff) < 1.0 && ai.hasDoubleJump) {
                            if (isShooting || (inOwnHalf && ballMovingToOwnGoal)) {
                                if (Math.random() < 0.2) jump = true; 
                            } else if (predY > 15) {
                                if (Math.random() < 0.1) jump = true;
                            }
                        }
                        else if (isLongDistance && ai.hasDoubleJump && Math.random() < 0.2) {
                            jump = true;
                            joyX = aimDx > 0 ? 10 : -10;
                            joyY = 0;
                        }
                    }
                }
            }
            
            ai.update(left, right, jump, up, down, boost, joyX, joyY, joyActive);
        }

        // --- 6. GAME LOGIC & COLLISIONS ---
        
        function explodeBall() {
            spawnParticles(ball.pos.x, ball.pos.y, '#888888', 80, 2.5, 50);
            spawnParticles(ball.pos.x, ball.pos.y, '#555555', 80, 1.5, 60);
            spawnParticles(ball.pos.x, ball.pos.y, '#aaaaaa', 60, 4.0, 30);
            spawnParticles(ball.pos.x, ball.pos.y, '#ffffff', 20, 5.0, 20); 
            
            [p1, p2].forEach(car => {
                const dx = car.pos.x - ball.pos.x;
                const dy = car.pos.y - ball.pos.y;
                const dist = Math.hypot(dx, dy) || 1; 
                if (dist < 25) {
                    const force = (25 - dist) / 15;
                    car.vel.x += (dx / dist) * force;
                    car.vel.y += (dy / dist) * force + (force * 0.5); 
                }
            });

            ball.mesh.visible = false;
            ball.isExploded = true;
            ball.pos.set(0, -100);
            ball.vel.set(0, 0);
            
            camera.position.x += (Math.random() - 0.5) * 4;
            camera.position.y += (Math.random() - 0.5) * 4;
        }

        function setupMenuCars() {
            if(p1) { scene.remove(p1.yawGroup); scene.remove(p2.yawGroup); p1=null; p2=null; }
            if(ball) { scene.remove(ball.mesh); ball=null; }
            
            const p1Color = SHOP_ITEMS.find(i=>i.id===PLAYER_DATA.selected).color;
            p1 = new Car(true, p1Color, PLAYER_DATA.selected); 
            p2 = new Car(false, '#f97316', 'Octan'); 
            
            p1.pos.set(-6, 1.0);
            p2.pos.set(6, 1.0);
            p1.updateMesh();
            p2.updateMesh();
        }

        function setupShopCar() {
            if(p1) { scene.remove(p1.yawGroup); p1=null; }
            const item = SHOP_ITEMS[currentShopIndex];
            p1 = new Car(true, item.color, item.id);
            p1.pos.set(-6, 1.0);
            p1.updateMesh();
        }

        function startGame() {
            if (isMobileDevice) { requestFullscreenAndLock(); }

            if(p1) { scene.remove(p1.yawGroup); }
            if(p2) { scene.remove(p2.yawGroup); }
            if(!ball) { ball = new Ball(); }
            
            document.getElementById('menu-left').classList.replace('translate-x-0', '-translate-x-[150%]');
            document.getElementById('menu-right').classList.replace('translate-x-0', 'translate-x-[150%]');
            
            const p1Color = SHOP_ITEMS.find(i=>i.id===PLAYER_DATA.selected).color;
            p1 = new Car(true, p1Color, PLAYER_DATA.selected); 
            p2 = new Car(false, '#f97316', 'Octan'); 

            p1.score = 0; p2.score = 0;
            GAME.timeRemaining = 120;
            GAME.timeUp = false;
            GAME.isOvertime = false;
            
            UI.timerDisplay.innerText = "2:00";
            UI.timerDisplay.style.color = "#ffffff";
            
            UI.pucksDisplay.classList.add('hidden');
            UI.menu.classList.add('hidden');
            UI.gameOver.classList.add('hidden');
            UI.hud.classList.remove('hidden');

            updateHUD();
            if (isMobileDevice) { UI.mobileControls.style.display = 'block'; }
            
            triggerRoundEnd(null);
        }

        async function triggerRoundEnd(msgText) {
            let activeRound = ++currentRoundId;
            
            if (msgText) {
                GAME.state = 'POST_GOAL'; 
                
                UI.msgText.innerText = msgText; 
                UI.msgText.style.color = msgText === "OVERTIME!" ? '#f59e0b' : '#fff';
                UI.msgText.style.opacity = 1; 
                UI.msgText.style.transform = "scale(1)";
                
                await sleep(2000); 
                if (activeRound !== currentRoundId) return; 
                
                UI.msgText.style.opacity = 0; 
                UI.msgText.style.transform = "scale(1.5)";
                await sleep(300);
            }
            
            if (activeRound !== currentRoundId) return;

            if (GAME.timeUp && !GAME.isOvertime && msgText && msgText !== "OVERTIME!") {
                if (p1.score !== p2.score) {
                    endGame(p1.score > p2.score ? "BLUE" : "ORANGE", p1.score > p2.score ? p1.color : p2.color);
                    return;
                } else {
                    GAME.isOvertime = true;
                    UI.timerDisplay.innerText = "+OVERTIME";
                    UI.timerDisplay.style.color = "#f59e0b";
                    
                    UI.msgText.innerText = "OVERTIME!"; 
                    UI.msgText.style.color = '#f59e0b';
                    UI.msgText.style.opacity = 1; 
                    UI.msgText.style.transform = "scale(1)";
                    await sleep(2000);
                    if (activeRound !== currentRoundId) return;
                    UI.msgText.style.opacity = 0; 
                    UI.msgText.style.transform = "scale(1.5)";
                    await sleep(300);
                }
            } else if (GAME.isOvertime && msgText && msgText.includes("SCORES")) {
                endGame(p1.score > p2.score ? "BLUE" : "ORANGE", p1.score > p2.score ? p1.color : p2.color);
                return;
            }

            GAME.state = 'ROUND_OVER'; 
            
            p1.reset(); p2.reset(); ball.reset();
            particles.forEach(p => scene.remove(p.mesh)); particles.length = 0;

            const animateText = async (text, color = '#fff') => {
                if (activeRound !== currentRoundId) return;
                UI.msgText.innerText = text; UI.msgText.style.color = color;
                UI.msgText.style.opacity = 1; UI.msgText.style.transform = "scale(1)";
                await sleep(700);
                if (activeRound !== currentRoundId) return;
                UI.msgText.style.opacity = 0; UI.msgText.style.transform = "scale(1.5)";
                await sleep(300);
            };

            await animateText("3", "#ef4444");
            await animateText("2", "#f59e0b");
            await animateText("1", "#10b981");
            
            if (activeRound !== currentRoundId) return;
            
            UI.msgText.innerText = "GO!";
            UI.msgText.style.color = "#fff";
            UI.msgText.style.opacity = 1;
            UI.msgText.style.transform = "scale(1)";
            
            GAME.state = 'PLAYING';
            
            await sleep(1000);
            if (activeRound !== currentRoundId) return;
            UI.msgText.style.opacity = 0;
            UI.msgText.style.transform = "scale(1.5)";
        }

        function endGame(winnerName, colorHexStr) {
            currentRoundId++;
            GAME.state = 'GAME_OVER';
            UI.winnerText.innerText = `${winnerName} WINS!`; 
            UI.winnerText.style.color = colorHexStr;
            
            if (winnerName === "BLUE") {
                PLAYER_DATA.pucks += 15;
                updateShopUI(); 
                UI.rewardText.classList.remove('hidden');
            } else {
                UI.rewardText.classList.add('hidden');
            }

            UI.gameOver.classList.remove('hidden'); 
            UI.mobileControls.style.display = 'none';
        }

        function returnToMenu() {
            currentRoundId++;
            GAME.state = 'MENU';
            UI.gameOver.classList.add('hidden'); 
            UI.hud.classList.add('hidden'); 
            UI.menu.classList.remove('hidden');
            UI.pucksDisplay.classList.remove('hidden');
            UI.mobileControls.style.display = 'none';
            
            document.getElementById('menu-left').classList.replace('-translate-x-[150%]', 'translate-x-0');
            document.getElementById('menu-right').classList.replace('translate-x-[150%]', 'translate-x-0');
            
            setupMenuCars();
        }

        function updateHUD() {
            UI.score1.innerText = p1.score; UI.score2.innerText = p2.score;
        }

        function resolveCarBallCollision(car, ball) {
            const carLen = 1.5; 
            const dirX = car.facingLeft ? -1 : 1;
            const cosA = Math.cos(car.angle); const sinA = Math.sin(car.angle);
            
            const pFront = new THREE.Vector2(car.pos.x + dirX*carLen*cosA, car.pos.y + carLen*sinA);
            const pBack = new THREE.Vector2(car.pos.x - dirX*carLen*cosA, car.pos.y - carLen*sinA);
            
            [pFront, pBack, car.pos].forEach(point => {
                const dist = point.distanceTo(ball.pos);
                const combinedRadii = 1.0 + ball.radius; 
                
                if (dist < combinedRadii) {
                    const overlap = combinedRadii - dist;
                    const normal = ball.pos.clone().sub(point).normalize();
                    
                    ball.pos.add(normal.clone().multiplyScalar(overlap));
                    
                    const relVel = ball.vel.clone().sub(car.vel);
                    const velAlongNormal = relVel.dot(normal);
                    
                    if (velAlongNormal < 0) {
                        const restitution = 0.6; 
                        const impulse = -(1 + restitution) * velAlongNormal * 0.55; 
                        
                        let push = normal.clone().multiplyScalar(impulse + 0.08);
                        push.y += 0.12 + Math.abs(push.x) * 0.15; 
                        
                        ball.vel.add(push);
                        
                        // Increased rotation applied to the ball upon impact
                        ball.angularVel += (Math.random() - 0.5) * 0.35; 
                        
                        if (car.flipTimer > 0) {
                            let dodgePush = normal.clone().multiplyScalar(0.40); 
                            dodgePush.y += 0.20; 
                            ball.vel.add(dodgePush);
                            spawnParticles(ball.pos.x, ball.pos.y, car.color, 20, 0.8);
                        } else {
                            spawnParticles(ball.pos.x, ball.pos.y, '#fff', 5, 0.3);
                        }
                    }
                }
            });
        }

        function checkCollisions() {
            if (GAME.state !== 'PLAYING' && GAME.state !== 'POST_GOAL') return;

            if (!ball.isExploded) {
                resolveCarBallCollision(p1, ball);
                resolveCarBallCollision(p2, ball);
            }

            if (GAME.state === 'PLAYING') {
                const goalThreshold = GAME.arena.width + ball.radius; 
                if (ball.pos.y > 8 && ball.pos.y < 28) {
                    if (ball.pos.x > goalThreshold) {
                        explodeBall();
                        p1.score++;
                        triggerRoundEnd("BLUE SCORES!");
                    } else if (ball.pos.x < -goalThreshold) {
                        explodeBall();
                        p2.score++;
                        triggerRoundEnd("ORANGE SCORES!");
                    }
                }
            }
        }

        // --- 7. INPUT HANDLING ---
        window.addEventListener('keydown', e => {
            if (['Space', 'KeyW', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
            if (e.code === 'Digit0') GAME.testingMode = !GAME.testingMode;
            if (e.code === 'KeyA') INPUT.left = true; 
            if (e.code === 'KeyD') INPUT.right = true;
            if (e.code === 'KeyW') INPUT.jump = true; 
            if (e.code === 'ArrowUp') INPUT.up = true; 
            if (e.code === 'ArrowDown') INPUT.down = true; 
            if (e.code === 'Space') INPUT.boost = true;
        }, {passive: false});

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyA') INPUT.left = false; 
            if (e.code === 'KeyD') INPUT.right = false;
            if (e.code === 'KeyW') INPUT.jump = false; 
            if (e.code === 'ArrowUp') INPUT.up = false; 
            if (e.code === 'ArrowDown') INPUT.down = false; 
            if (e.code === 'Space') INPUT.boost = false;
        });

        function getMappedTouch(touch) {
            if (!isRotated) {
                return { clientX: touch.clientX - wrapperLeft, clientY: touch.clientY - wrapperTop, identifier: touch.identifier };
            } else {
                return { clientX: touch.clientY - wrapperTop, clientY: wrapperLeft - touch.clientX, identifier: touch.identifier };
            }
        }

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const joyArea = document.getElementById('joystick-area');
        
        let joyActive = false; let joyOrigin = {x: 0, y: 0}; let joyTouchId = null;

        joyArea.addEventListener('touchstart', e => {
            e.preventDefault();
            if (joyActive) return; 
            const touch = getMappedTouch(e.changedTouches[0]);
            joyTouchId = touch.identifier; joyActive = true; 
            joyOrigin.x = touch.clientX; joyOrigin.y = touch.clientY;
            
            joyBase.style.display = 'block';
            joyBase.style.left = touch.clientX + 'px'; joyBase.style.top = touch.clientY + 'px';
            joyStick.style.left = '50%'; joyStick.style.top = '50%';
            joyStick.style.transform = `translate(-50%, -50%)`;
            
            INPUT.joyActive = true; INPUT.joyX = 0; INPUT.joyY = 0;
        });

        joyArea.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!joyActive) return;
            let touch = null;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) { touch = getMappedTouch(e.changedTouches[i]); break; }
            }
            if(!touch) return; 

            const dx = touch.clientX - joyOrigin.x; const dy = touch.clientY - joyOrigin.y;
            const maxR = 40; const dist = Math.hypot(dx, dy);
            let nx = dx, ny = dy;
            if (dist > maxR) { nx = (dx / dist) * maxR; ny = (dy / dist) * maxR; }
            
            joyStick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
            INPUT.joyX = dx; INPUT.joyY = dy;
            INPUT.left = dx < -20; INPUT.right = dx > 20;
        });

        function endJoy(e) { 
            if (!joyActive) return;
            let trackedTouchLifted = false;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) { trackedTouchLifted = true; break; }
            }
            if (!trackedTouchLifted) return;
            e.preventDefault(); 
            joyActive = false; joyTouchId = null; joyBase.style.display = 'none'; 
            INPUT.left = false; INPUT.right = false; 
            INPUT.joyActive = false; INPUT.joyX = 0; INPUT.joyY = 0;
        }
        
        joyArea.addEventListener('touchend', endJoy); joyArea.addEventListener('touchcancel', endJoy);

        const btnJump = document.getElementById('btn-jump'); 
        const btnBoost = document.getElementById('btn-boost');
        
        function bindBtn(el, actionName) {
            if (!el) return;
            el.addEventListener('touchstart', (e) => { e.preventDefault(); INPUT[actionName] = true; el.classList.add('active'); }, {passive: false});
            el.addEventListener('touchend', (e) => { e.preventDefault(); INPUT[actionName] = false; el.classList.remove('active'); }, {passive: false});
            el.addEventListener('touchcancel', (e) => { e.preventDefault(); INPUT[actionName] = false; el.classList.remove('active'); }, {passive: false});
        }
        
        bindBtn(btnJump, 'jump'); 
        bindBtn(btnBoost, 'boost');

        // --- 8. MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;
            
            if (GAME.state === 'MENU') {
                if (p1 && p2) {
                    p1.visualRotY += 0.02; p2.visualRotY -= 0.02;
                    p1.updateMesh(); p2.updateMesh();
                }
                camera.position.lerp(new THREE.Vector3(0, 16, 45), 0.05); 
                targetLookAt.set(0, 14, 0); // Aim the camera higher so the map sits lower on screen
            }
            else if (GAME.state === 'SHOP') {
                if (p1 && p2) { p1.visualRotY += 0.02; p2.visualRotY -= 0.02; p1.updateMesh(); p2.updateMesh(); }
                const isMobile = GAME.width < 768;
                camera.position.lerp(new THREE.Vector3(-6, 4, isMobile ? 30 : 20), 0.05);
                targetLookAt.set(-6, 1.5, 0);
            }
            else if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER' || GAME.state === 'POST_GOAL') {
                p1.update(INPUT.left, INPUT.right, INPUT.jump, INPUT.up, INPUT.down, INPUT.boost, INPUT.joyX, INPUT.joyY, INPUT.joyActive);
                runAI(p2, p1, ball);
                
                if (ball) ball.update();
                
                checkCollisions(); 
                
                if (GAME.state === 'PLAYING') {
                    if (!GAME.isOvertime && !GAME.timeUp) {
                        GAME.timeRemaining -= delta;
                        if (GAME.timeRemaining <= 0) {
                            GAME.timeRemaining = 0;
                            GAME.timeUp = true;
                        }
                    }
                    
                    if (GAME.isOvertime) {
                        UI.timerDisplay.innerText = "+OVERTIME";
                        UI.timerDisplay.style.color = "#f59e0b";
                    } else {
                        const mins = Math.floor(GAME.timeRemaining / 60);
                        const secs = Math.floor(GAME.timeRemaining % 60).toString().padStart(2, '0');
                        UI.timerDisplay.innerText = `${mins}:${secs}`;
                    }

                    if (GAME.timeUp && !GAME.isOvertime && ball && ball.isTouchingGround) {
                        if (p1.score === p2.score) {
                            GAME.isOvertime = true;
                            UI.timerDisplay.innerText = "+OVERTIME";
                            UI.timerDisplay.style.color = "#f59e0b";
                            triggerRoundEnd("OVERTIME!");
                        } else {
                            endGame(p1.score > p2.score ? "BLUE" : "ORANGE", p1.score > p2.score ? p1.color : p2.color);
                        }
                    }
                }
                
                if(p1 && p2 && ball) {
                    const focusX = (p1.pos.x + ball.pos.x) / 2;
                    let focusY = Math.max(4, (p1.pos.y + ball.pos.y) / 2);
                    
                    const dx = Math.abs(p1.pos.x - ball.pos.x);
                    const dy = Math.abs(p1.pos.y - ball.pos.y);
                    
                    // Find the highest point of interest (excluding the ball so a high ball doesn't force a zoom out)
                    const highestY = Math.max(p1.pos.y, p2.pos.y);
                    
                    // Creates a multiplier (0.0 to 1.0) that activates only when cars go above Y=15
                    const highFactor = Math.max(0, Math.min(1, (highestY - 15) / 20));
                    
                    // Tighter padding to center perfectly on the action
                    const padX = 18 + (highFactor * 10);
                    const padY = 18 + (highFactor * 15);
                    
                    const fovRad = (camera.fov * Math.PI) / 180;
                    const aspect = camera.aspect;
                    
                    const targetZX = ((dx + padX) / 2) / (Math.tan(fovRad / 2) * aspect);
                    const targetZY = ((dy + padY) / 2) / Math.tan(fovRad / 2);
                    
                    let targetZ = Math.max(targetZX, targetZY);
                    
                    // Dynamically scale max zoom limit
                    const maxZoom = 70 + (highFactor * 25);
                    targetZ = Math.max(45, Math.min(maxZoom, targetZ)); 

                    // Remove all massive offsets to perfectly center the zoom on the cars again
                    let lookAtY = focusY + 3; 

                    // Gently prevent seeing into the void below the map
                    const bottomEdge = lookAtY - (targetZ * Math.tan(fovRad / 2));
                    if (bottomEdge < -6) {
                        lookAtY += (-6 - bottomEdge);
                    }

                    // Keep camera slightly above look target for 3D perspective
                    camera.position.lerp(new THREE.Vector3(focusX, lookAtY + 3, targetZ), 0.1);
                    targetLookAt.set(focusX, lookAtY, 0);
                }
            }
            
            currentLookAt.lerp(targetLookAt, 0.1);
            camera.lookAt(currentLookAt);

            updateParticles();
            renderer.render(scene, camera);

            if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER' || GAME.state === 'POST_GOAL') {
                updateHUD();
            }
        }

        setupMenuCars();
        animate();

    </script>
